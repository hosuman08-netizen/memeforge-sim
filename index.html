<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemeForge</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
    <h1>MemeForge <span class="tag">demo</span></h1>
    <p class="tag">Forge a meme into a coin and ride its bonding curve before the drop window closes.</p>
    <div id="fomo" class="fomo"></div>
  </header>
  <main>
    <section>
      <h2>Forge your coin</h2>
      <div class="coin-form">
        <input id="coinName" maxlength="20" placeholder="Coin name (e.g. Doge Reborn)" autocomplete="off">
        <input id="coinTicker" maxlength="6" placeholder="TICKER" autocomplete="off" class="ticker-in">
      </div>
      <button onclick="recordMemeVoice()">Record Hype Voice</button>
      <div id="voiceOut"></div>
      <button onclick="launchMeme()">Launch on Bonding Curve</button>
      <div id="launchOut"></div>
      <button onclick="shareMemeFate()">Share My Coin</button>
    </section>
    <section id="drops">
      <h2>Meme Drop Windows</h2>
      <div id="dropList"></div>
    </section>
    <section>
      <h2>Hype meter &amp; history</h2>
      <canvas id="meme-hype-canvas" width="320" height="120"></canvas>
      <div id="creations"></div>
    </section>
  </main>
  <footer><small>FICTIONAL SIMULATION ONLY • Not real money, tokens, or investment advice • 18+</small></footer>
  <script src="hype-eye.js"></script>
  <script src="script.js"></script>
</body>
</html>
